# API_CONTRACT.md

## Orders API

### List Orders

| Method | Path         | Auth Required | Request Body | Response Schema | Status Codes |
|--------|--------------|--------------|--------------|----------------|-------------|
| GET    | /api/orders  | No           | None         | `Order[]`      | 200         |

#### `Order` schema

```typescript
{
  id: number;
  customerName: string;
  address: string;
  status: 'pending' | 'in_transit' | 'delivered' | 'cancelled';
  createdAt: string; // ISO8601
  updatedAt: string; // ISO8601
  items: OrderItem[];
}
```

#### `OrderItem` schema

```typescript
{
  id: number;
  orderId: number;
  productName: string;
  quantity: number;
  unitPrice: number;
}
```

---

### Get Order by ID

| Method | Path              | Auth Required | Request Body | Response Schema | Status Codes |
|--------|-------------------|--------------|--------------|----------------|-------------|
| GET    | /api/orders/:id   | No           | None         | `Order`        | 200         |

---

### Create Order

| Method | Path         | Auth Required | Request Body    | Response Schema | Status Codes |
|--------|--------------|--------------|-----------------|----------------|-------------|
| POST   | /api/orders  | No           | `OrderCreate`   | `Order`        | 201         |

#### `OrderCreate` schema

```typescript
{
  customerName: string;
  address: string;
  items: OrderItemCreate[];
}
```

#### `OrderItemCreate` schema

```typescript
{
  productName: string;
  quantity: number;
  unitPrice: number;
}
```

---

### Update Order Status

| Method | Path                        | Auth Required | Request Body         | Response Schema | Status Codes |
|--------|-----------------------------|--------------|----------------------|----------------|-------------|
| PATCH  | /api/orders/:id/status      | No           | `OrderUpdateStatus`  | `Order`        | 200         |

#### `OrderUpdateStatus` schema

```typescript
{
  status: 'pending' | 'in_transit' | 'delivered' | 'cancelled';
}
```

---

### Delete Order

| Method | Path              | Auth Required | Request Body | Response Schema         | Status Codes |
|--------|-------------------|--------------|--------------|------------------------|-------------|
| DELETE | /api/orders/:id   | No           | None         | { success: boolean }   | 200         |

---

## KPI Dashboard API

### Get KPIs

| Method | Path      | Auth Required | Request Body | Response Schema | Status Codes |
|--------|-----------|--------------|--------------|----------------|-------------|
| GET    | /api/kpi  | No           | None         | `KPI`          | 200         |

#### `KPI` schema

```typescript
{
  totalOrders: number;
  deliveredOrders: number;
  pendingOrders: number;
  cancelledOrders: number;
  inTransitOrders: number;
  averageDeliveryTimeMinutes: number;
}
```